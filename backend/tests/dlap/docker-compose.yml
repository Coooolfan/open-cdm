version: '3.1'

# use this yml for docker-compose up -d
services:
  keycloak:
    image: keycloak/keycloak
    container_name: keycloak
    restart: always
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - 18080:8080

  ldap_admin:
    image: osixia/phpldapadmin
    container_name: ldap_admin
    restart: always
    privileged: true
    environment:
      PHPLDAPADMIN_HTTPS: false
      PHPLDAPADMIN_LDAP_HOSTS: ldap_normal
    ports:
      - 10004:80

  ldap_normal:
    image: osixia/openldap  # 如果有私有仓库可以从自己的私有仓库拉取镜像
    container_name: ldap_normal
    restart: always
    environment:
      LDAP_LOG_LEVEL: "256"
      LDAP_ORGANISATION: "clougence"      ## 您的组织名称
      LDAP_DOMAIN: "clougence.com"        ## 公司域名
      LDAP_BASE_DN: "dc=clougence,dc=com" ## 根据域名组成，登陆账号为：cn=admin,dc=clougence,dc=com
      LDAP_ADMIN_PASSWORD: "admin"        ## 密码自己来设置
      LDAP_CONFIG_PASSWORD: "admin"
      LDAP_READONLY_USER: "false"
      #LDAP_READONLY_USER_USERNAME: "readonly"
      #LDAP_READONLY_USER_PASSWORD: "readonly"
      LDAP_RFC2307BIS_SCHEMA: "false"
      LDAP_BACKEND: "mdb"
      LDAP_REPLICATION: "false"
      KEEP_EXISTING_CONFIG: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "true"
      #LDAP_SSL_HELPER_PREFIX: "ldap"
    ports:
      - 1389:389
      - 1636:636
