CG_JDBC_PARAMS_MSSQLSERVER_user=The database user, if connection with SQL user and password.
CG_JDBC_PARAMS_MSSQLSERVER_password=The database password, if connection with SQL user and password.\n\
  For Kerberos connection with principal name and password, this property is set to the Kerberos Principal password.\n\
  (Version 10.2+) When authentication=ActiveDirectoryServicePrincipal, the password property identifies the password to use for the Active Directory principal.\
CG_JDBC_PARAMS_MSSQLSERVER_database=The name of the database to connect to.\nIf not stated, a connection is made to the default database.
CG_JDBC_PARAMS_MSSQLSERVER_port=The port where the server is listening. If the port number is specified in the connection string, no request to SQLbrowser is made. When the port and instanceName are both specified, the connection is made to the specified port. However, the instanceName is validated and an error is thrown if it doesn't match the port.
CG_JDBC_PARAMS_MSSQLSERVER_accessToken=(Version 6.0+) Use this property to connect to a database using an access token. accessToken can't be set using the connection URL.
CG_JDBC_PARAMS_MSSQLSERVER_applicationIntent=(Version 6.0+) Declares the application workload type to connect to a server.\nPossible values are ReadOnly and ReadWrite.\n\
  For more information about disaster recovery, see JDBC driver support for High Availability, disaster recovery.
CG_JDBC_PARAMS_MSSQLSERVER_applicationName=The application name, or "Microsoft JDBC Driver for SQL Server" if no name is provided.\nUsed to identify the specific application in various SQL Server profiling and logging tools.
CG_JDBC_PARAMS_MSSQLSERVER_authentication=(Version 6.0+) This optional property indicates which authentication method to use for connection. Possible values are ActiveDirectoryIntegrated, ActiveDirectoryPassword, ActiveDirectoryManagedIdentity (version 12.2+), ActiveDirectoryMSI (version 7.2+), ActiveDirectoryInteractive (version 9.2+), ActiveDirectoryServicePrincipal (version 9.2+), SqlPassword, and the default NotSpecified.
CG_JDBC_PARAMS_MSSQLSERVER_authenticationScheme=Indicates which kind of integrated security you want your application to use. Possible values are JavaKerberos, NTLM (version 7.4+), and the default NativeAuthentication.
CG_JDBC_PARAMS_MSSQLSERVER_cancelQueryTimeout=(Version 6.4+) This property can be used to cancel a queryTimeout set on the connection. Query execution hangs and doesn't throw an exception if the TCP connection to the server is silently dropped. This property is only applicable if 'queryTimeout' is also set on the connection.
CG_JDBC_PARAMS_MSSQLSERVER_clientCertificate=(Version 8.4+) Specifies the location of the certificate to be used for client certificate authentication. The JDBC driver supports PFX, PEM, DER, and CER file extensions.
CG_JDBC_PARAMS_MSSQLSERVER_clientKey=(Version 8.4+) Specifies the location of the private key for PEM, DER, and CER certificates specified by the clientCertificate attribute.
CG_JDBC_PARAMS_MSSQLSERVER_clientKeyPassword=(Version 8.4+) Specifies the optional password string for accessing the clientKey file's private key.
CG_JDBC_PARAMS_MSSQLSERVER_columnEncryptionSetting=(Version 6.0+) Set to "Enabled" to use the Always Encrypted (AE) feature. When AE is enabled, the JDBC driver transparently encrypts and decrypts sensitive data stored in encrypted database columns on the server.
CG_JDBC_PARAMS_MSSQLSERVER_connectRetryCount=(Version 9.4+) The number of reconnection attempts if there's a connection failure.
CG_JDBC_PARAMS_MSSQLSERVER_connectRetryInterval=(Version 9.4+) The number of seconds between each connection retry attempt.
CG_JDBC_PARAMS_MSSQLSERVER_datetimeParameterType=(Version 12.2+) The SQL data type to use for Java date/timestamp parameters.
CG_JDBC_PARAMS_MSSQLSERVER_delayLoadingLobs=Flag to indicate whether to stream or not stream all the LOB objects being retrieved from the ResultSet. Setting this property to "false" loads the entire LOB object into memory without streaming.
CG_JDBC_PARAMS_MSSQLSERVER_domain=(Version 7.4+) The Windows domain to authenticate to when using NTLM authentication.
CG_JDBC_PARAMS_MSSQLSERVER_disableStatementPooling=Flag indicates if statement pooling should be used.
CG_JDBC_PARAMS_MSSQLSERVER_enablePrepareOnFirstPreparedStatementCall=Set to "true" to enable prepared statement handle creation by calling sp_prepexec with the first execution of a prepared statement.
CG_JDBC_PARAMS_MSSQLSERVER_enclaveAttestationUrl=(Version 8.2+) This optional property indicates the attestation service endpoint URL to use for Always Encrypted with secure enclaves.
CG_JDBC_PARAMS_MSSQLSERVER_enclaveAttestationProtocol=(Version 8.2+) This optional property indicates the attestation protocol to use for Always Encrypted with secure enclaves. Currently, the only supported values for this field are HGS, AAS, and NONE (NONE is only supported in version 11.2+).
CG_JDBC_PARAMS_MSSQLSERVER_encrypt=Set to "true" to specify that the SQL Server uses TLS encryption for all the data sent between the client and the server if the server has a certificate installed. The default value is "true" in version 10.2 and later and "false" in 9.4 and earlier.
CG_JDBC_PARAMS_MSSQLSERVER_failoverPartner=The name of the failover server used in a database mirroring configuration. This property is used for an initial connection failure to the principal server. After you make the initial connection, this property is ignored. Must be used with the databaseName property.
CG_JDBC_PARAMS_MSSQLSERVER_fips=For FIPS enabled Java Virtual Machine (JVM) this property should be true.
CG_JDBC_PARAMS_MSSQLSERVER_fipsProvider=FIPS provider configured in JVM. For example, BCFIPS or SunPKCS11-NSS. Removed in version 6.4.0. For more information, see GitHub issue 460.
CG_JDBC_PARAMS_MSSQLSERVER_gsscredential=(Version 6.2+) User credentials to be used for Kerberos Constrained Delegation can be passed in this property.
CG_JDBC_PARAMS_MSSQLSERVER_hostNameInCertificate=The host name to be used to validate the SQL Server TLS/SSL certificate.\nIf the hostNameInCertificate property is unspecified or set to null, the Microsoft JDBC Driver for SQL Server uses the serverName property value on the connection URL as the host name to validate the SQL Server TLS/SSL certificate.
CG_JDBC_PARAMS_MSSQLSERVER_instanceName=The database instance name to connect to. When it isn't specified, a connection is made to the default instance. For the case where both the instanceName and port are specified, see the notes for port.
CG_JDBC_PARAMS_MSSQLSERVER_integratedSecurity=Set to "true" to indicate that Windows credentials are used by SQL Server on Windows operating systems. If "true", the JDBC driver searches the local computer credential cache for credentials that were provided when a user signed in to the computer or network.
CG_JDBC_PARAMS_MSSQLSERVER_ipaddresspreference=The IP preference used by the client application.
CG_JDBC_PARAMS_MSSQLSERVER_jaasConfigurationName=(Version 6.2+) Each connection to SQL Server can use its own JAAS Login Configuration name to establish a Kerberos connection. The name of the configuration entry can be passed through this property. This is intended for use when creating a Kerberos configuration file. By default, the driver will look for the name SQLJDBCDriver.
CG_JDBC_PARAMS_MSSQLSERVER_keyStoreAuthentication=(Version 6.0+) This property identifies which key store to use with Always Encrypted and determines an authentication mechanism used to authenticate to the key store. The driver supports setting up of the Java Key Store seamlessly when you set "keyStoreAuthentication=JavaKeyStorePassword". To use this property, you also must set the keyStoreLocation and keyStoreSecret properties for the Java Key Store.
CG_JDBC_PARAMS_MSSQLSERVER_keyStoreLocation=(Version 6.0+) When keyStoreAuthentication=JavaKeyStorePassword, the keyStoreLocation property identifies the path to the Java keystore file that stores the Column Master Key to be used with Always Encrypted data. The path must include the keystore filename.
CG_JDBC_PARAMS_MSSQLSERVER_keyStorePrincipalId=(Version 8.4+) When keyStoreAuthentication=KeyVaultManagedIdentity, the keyStorePrincipalId property specifies a valid Azure Active Directory application client ID.
CG_JDBC_PARAMS_MSSQLSERVER_keyStoreSecret=(Version 6.0+) When keyStoreAuthentication=JavaKeyStorePassword, the keyStoreSecret property identifies the password to use for the keystore and the key. For using the Java Key Store, the keystore and the key password must be the same.
CG_JDBC_PARAMS_MSSQLSERVER_lastUpdateCount=A "true" value only returns the last update count from an SQL statement passed to the server, and it can be used on single SELECT, INSERT, or DELETE statements to ignore other update count caused by server triggers. Setting this property to "false" causes all update counts to be returned, including this update counts returned by server triggers.
CG_JDBC_PARAMS_MSSQLSERVER_lockTimeout=The number of milliseconds to wait before the database reports a lock time-out. The default behavior is to wait indefinitely. If it's specified, this value is the default for all statements on the connection.
CG_JDBC_PARAMS_MSSQLSERVER_loginTimeout=The number of seconds the driver should wait before timing out a failed connection. A zero value indicates that the timeout is the default system timeout, which is 30 seconds by default in version 11.2 and higher and 15 seconds by default in version 10.2 and lower. A nonzero value is the number of seconds the driver should wait before timing out a failed connection.
CG_JDBC_PARAMS_MSSQLSERVER_maxResultBuffer=(Version 9.2+) maxResultBuffer can be used to set the maximum bytes to read when reading a result set. If not specified, then the entire result set is read. Size can be specified in two styles:
CG_JDBC_PARAMS_MSSQLSERVER_msiClientId=(Deprecated) (Version 7.2+) The Client ID of the Managed Identity (MSI) used to acquire an accessToken to establish a connection with the ActiveDirectoryManagedIdentity or ActiveDirectoryMSI authentication mode.
CG_JDBC_PARAMS_MSSQLSERVER_multiSubnetFailover=Always specify multiSubnetFailover=true to connect to the availability group listener of a SQL Server availability group or an SQL Server Failover Cluster Instance. multiSubnetFailover=true configures the driver to provide faster detection of and connection to the (currently) active server. Possible values are true and false. For more information about disaster recovery, see JDBC Driver Support for High Availability, Disaster Recovery.
CG_JDBC_PARAMS_MSSQLSERVER_packetSize=The network packet size used to communicate with the server, specified in bytes. A value of -1 indicates to use the server's default packet size. A value of 0 indicates to use the maximum value of 32767. If this property is set to a value outside the acceptable range, an exception occurs.
CG_JDBC_PARAMS_MSSQLSERVER_prepareMethod=(Version 11.2.0+) Specifies the underlying prepare method to be used by the driver with prepared statements.
CG_JDBC_PARAMS_MSSQLSERVER_queryTimeout=The number of seconds to wait before a timeout has occurred on a query. The default value is -1, which means infinite timeout. Set this value to 0 also implies to wait indefinitely.
CG_JDBC_PARAMS_MSSQLSERVER_realm=(Version 9.4+) The realm for Kerberos authentication. Set this value to override the Kerberos authentication realm the driver autodetects from the server's realm.
CG_JDBC_PARAMS_MSSQLSERVER_replication=(Version 9.4+) This setting tells the server if the connection is used for replication. When enabled, triggers with the NOT FOR REPLICATION option don't fire on the connection.
CG_JDBC_PARAMS_MSSQLSERVER_responseBuffering=If this property is set to "adaptive", the minimum possible data is buffered when necessary. The default mode is "adaptive."
CG_JDBC_PARAMS_MSSQLSERVER_selectMethod=If this property is set to "cursor," a database cursor is created for each query created on the connection for TYPE_FORWARD_ONLY and CONCUR_READ_ONLY cursors. This property is typically required only if the application generates large result sets that can't be fully contained in client memory. If this property is set to "cursor," only a limited number of result set rows are kept in client memory.
CG_JDBC_PARAMS_MSSQLSERVER_sendStringParametersAsUnicode=If the sendStringParametersAsUnicode property is set to "true", String parameters are sent to the server in Unicode format.
CG_JDBC_PARAMS_MSSQLSERVER_sendTemporalDataTypesAsStringForBulkCopy=(Version 8.4+) This connection property, when set to "false", sends DATE, DATETIME, DATIMETIME2, DATETIMEOFFSET, SMALLDATETIME, and TIME datatypes as their respective types instead of sending them as String.
CG_JDBC_PARAMS_MSSQLSERVER_sendTimeAsDatetime=This property was added in SQL Server JDBC Driver 3.0.
CG_JDBC_PARAMS_MSSQLSERVER_serverCertificate=(Version 11.2.0+) The path to the server certificate file. Used for validation when using encrypt set to strict. The driver supports certificate files using the PEM file format.
CG_JDBC_PARAMS_MSSQLSERVER_serverName=The computer running SQL Server or an Azure SQL database.
CG_JDBC_PARAMS_MSSQLSERVER_serverNameAsACE==(Version 6.0+) Set to "true" to indicate that the driver should translate the Unicode server name to ASCII compatible encoding (Punycode) for the connection. If this setting is false, the driver uses the server name as provided to connect.
CG_JDBC_PARAMS_MSSQLSERVER_serverPreparedStatementDiscardThreshold=(Version 6.2+) This property can be used to control how many outstanding prepared statement discard actions (sp_unprepare) can be outstanding per connection before a call to clean up the outstanding handles on the server is executed.
CG_JDBC_PARAMS_MSSQLSERVER_serverSpn=(Version 4.2+) This optional property can be used to specify the Service Principal Name (SPN) for a Java Kerberos connection. It's used with authenticationScheme.
CG_JDBC_PARAMS_MSSQLSERVER_socketFactoryClass=(Version 8.4+) Specifies the class name for a custom socket factory to be used instead of the default socket factory.
CG_JDBC_PARAMS_MSSQLSERVER_socketTimeout=The number of milliseconds to wait before a timeout is occurred on a socket read or accept. The default value is 0, which means infinite timeout.
CG_JDBC_PARAMS_MSSQLSERVER_statementPoolingCacheSize=(Version 6.4+) This property can be used to enable prepared statement handle caching in the driver.
CG_JDBC_PARAMS_MSSQLSERVER_sslProtocol=(Version 6.4+) This property can be used to specify the TLS protocol to be considered during secure connection.\nPossible values are: TLS, TLSv1, TLSv1.1, and TLSv1.2.
CG_JDBC_PARAMS_MSSQLSERVER_transparentNetworkIPResolution=(Version 6.0+) This property provides faster detection of and connection to the (currently) active server. Possible values are "true" and "false" where "true" is the default value.
CG_JDBC_PARAMS_MSSQLSERVER_trustManagerClass=(Version 6.4+) The fully qualified class name of a custom javax.net.ssl.TrustManager implementation.
CG_JDBC_PARAMS_MSSQLSERVER_trustManagerConstructorArg=(Version 6.4+) An optional argument to pass to the constructor of the TrustManager. If trustManagerClass is specified and an encrypted connection is requested, the custom TrustManager is used instead of the default system JVM keystore-based TrustManager.
CG_JDBC_PARAMS_MSSQLSERVER_trustServerCertificate=Set to "true" to specify that the driver doesn't validate the server TLS/SSL certificate.\nIf "true", the server TLS/SSL certificate is automatically trusted when the communication layer is encrypted using TLS.
CG_JDBC_PARAMS_MSSQLSERVER_trustStore=The path (including filename) to the certificate trustStore file. The trustStore file contains the list of certificates that the client trusts.
CG_JDBC_PARAMS_MSSQLSERVER_trustStorePassword=The password used to check the integrity of the trustStore data.
CG_JDBC_PARAMS_MSSQLSERVER_trustStoreType=Set this property to specify trust store type to be used for FIPS mode.
CG_JDBC_PARAMS_MSSQLSERVER_useBulkCopyForBatchInsert=(Version 9.2+) This connection property can be enabled to transparently use the Bulk Copy API when doing batch insert operations using java.sql.PreparedStatement. This feature potentially provides much higher performance when enabled.
CG_JDBC_PARAMS_MSSQLSERVER_useFmtOnly=(Version 7.4+) Provides an alternative way to query Parameter Metadata from the server. Set this property to "true" to specify that the driver should use SET FMTONLY logic when querying Parameter Metadata. This feature is off by default, and it isn't recommended to use this property as SET FMTONLY is marked for deprecation. useFmtOnly is made available to use only as a workaround for known issues and limitations in sp_describe_undeclared_parameters.
CG_JDBC_PARAMS_MSSQLSERVER_workstationID=The workstation ID. Used to identify the specific workstation in various profiling and logging tools.
CG_JDBC_PARAMS_MSSQLSERVER_xopenStates=Set to "true" to specify that the driver returns XOPEN-compliant state codes in exceptions.
