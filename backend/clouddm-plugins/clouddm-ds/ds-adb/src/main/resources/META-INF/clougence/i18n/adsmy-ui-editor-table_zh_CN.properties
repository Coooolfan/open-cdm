#
SUPPORT_LEVEL_HINT_FOR_CANCEL_QUERY=取消执行中的查询会导致连接重建、事务回滚！
#
UI_EDITOR_TABLEINFO_ENGINE_TITLE=存储引擎
UI_EDITOR_TABLEINFO_ENGINE_DESC=表的 engine 参数，用于指定 AnalyticDB MySQL 版内表的存储引擎类型，目前为固定值。
UI_EDITOR_TABLEINFO_ENGINE_XUANWU_LABEL=玄武分析型存储
UI_EDITOR_TABLEINFO_STORAGEPOLICY_TITLE=存储策略
UI_EDITOR_TABLEINFO_STORAGEPOLICY_DESC=指定热（HOT）、冷（COLD）、或混合（MIXED）的存储策略。默认值为：HOT。
UI_EDITOR_TABLEINFO_STORAGEPOLICY_EMPTY_LABEL=默认
UI_EDITOR_TABLEINFO_STORAGEPOLICY_HOT_LABEL=热（HOT）
UI_EDITOR_TABLEINFO_STORAGEPOLICY_COLD_LABEL=冷（COLD）
UI_EDITOR_TABLEINFO_STORAGEPOLICY_MIXED_LABEL=混合（MIXED）
UI_EDITOR_TABLEINFO_STORAGEPOLICY_MIXED_PT_CNT_TITLE=热分区数
UI_EDITOR_TABLEINFO_STORAGEPOLICY_MIXED_PT_CNT_DESC=指定 MIXED 存储策略时热分区的个数。
UI_EDITOR_TABLEINFO_BLOCKSIZE_TITLE=Block 存储大小
UI_EDITOR_TABLEINFO_BLOCKSIZE_DESC=指定列式存储中每个 block 存储的 Value 的个数，也是最小的 IO 单元
UI_EDITOR_TABLEINFO_RTENGINE_TITLE=存储引擎
UI_EDITOR_TABLEINFO_RTENGINE_DESC=表的 rt_engine 参数，用于指定实时存储引擎类型。
UI_EDITOR_TABLEINFO_RTENGINE_EMPTY_LABEL=(空)
UI_EDITOR_TABLEINFO_RTENGINE_ROWSTORE_LABEL=行式存储
UI_EDITOR_TABLEINFO_RTENGINE_COLUMNSTORE_LABEL=列式存储
UI_EDITOR_TABLEINFO_PROPERTIES_TITLE=表属性
UI_EDITOR_TABLEINFO_PROPERTIES_DESC=用于表的特殊属性设置
UI_EDITOR_INDEXES_TYPE_TITLE=类型
UI_EDITOR_INDEXES_TYPE_DESC=选择要创建的索引类型
UI_EDITOR_INDEXES_TYPE_INDEX_LABEL=普通索引
UI_EDITOR_INDEXES_TYPE_ANN_LABEL=向量索引
UI_EDITOR_INDEXES_ANNDISFUNCTION_TITLE=距离公式
UI_EDITOR_INDEXES_ANNDISFUNCTION_DESC=向量距离计算公式，默认值为 SquaredL2，公式："(x1-y1)^2+(x2-y2)^2+…"
UI_EDITOR_INDEXES_ANNALGORITHM_TITLE=距离算法
UI_EDITOR_INDEXES_ANNALGORITHM_DESC=向量距离计算公式使用的算法，默认值为 HNSW_PQ
UI_EDITOR_INDEXES_TYPE_ANNDISFUNCTION_EMPTY_LABEL=默认
UI_EDITOR_INDEXES_TYPE_ANNDISFUNCTION_SQUAREDL2_LABEL=SquaredL2
UI_EDITOR_INDEXES_TYPE_ANNALGORITHM_EMPTY_LABEL=默认
UI_EDITOR_INDEXES_TYPE_ANNALGORITHM_HNSWPQ_LABEL=HNSW_PQ
