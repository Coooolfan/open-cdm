CG_JDBC_PARAMS_POSTGRESQL_user=String The database user on whose behalf the connection is being made.
CG_JDBC_PARAMS_POSTGRESQL_password=String The database user’s password.
CG_JDBC_PARAMS_POSTGRESQL_options=String Specify ‘options’ connection initialization parameter sent to the PostgreSQL server. \
  For example setting this to -c statement_timeout=5min would set the statement timeout parameter for this session to 5 minutes. see Client Connection Defaults for details.
CG_JDBC_PARAMS_POSTGRESQL_ssl=Connect using SSL. The server must have been compiled with SSL support. This property does not need a value associated with it. The mere presence of it specifies an SSL connection. \
  However, for compatibility with future versions, the value “true” is preferred. For more information see Using SSL.\nSetting up the certificates and keys for ssl connection can be tricky see The test documentation for detailed examples.
CG_JDBC_PARAMS_POSTGRESQL_sslfactory=The provided value is a class name to use as the SSLSocketFactory when establishing an SSL connection. For more information see the section called Custom SSLSocketFactory defaults to LibPQFactory
CG_JDBC_PARAMS_POSTGRESQL_sslfactoryarg=This value is an optional argument to the constructor of the sslfactory class provided above. For more information see the section called Custom SSLSocketFactory.
CG_JDBC_PARAMS_POSTGRESQL_sslmode=possible values include disable , allow , prefer , require , verify-ca and verify-full . require , allow and prefer all default to a non-validating SSL factory and do not check the validity of the certificate or the host name. \
  verify-ca validates the certificate, but does not verify the hostname. verify-full will validate that the certificate is correct and verify the host connected to has the same hostname as the certificate. Default is prefer Setting these will necessitate storing the server certificate on the client machine see Configuring the client for details.
CG_JDBC_PARAMS_POSTGRESQL_sslcert=Provide the full path for the certificate file. Defaults to defaultdir/postgresql.crt, where defaultdir is ${user.home}/.postgresql/ in nix systems and %appdata%/postgresql/ on windows. \nIt can be a PEM encoded X509v3 certificate.\nNOTE:This parameter is ignored when using PKCS-12 keys, since in that case the certificate is also retrieved from the same keyfile.
CG_JDBC_PARAMS_POSTGRESQL_sslkey=Provide the full path for the key file. Defaults to defaultdir/postgresql.pk8. See sslcert for defaultdir.\nNOTE:The key file must be in PKCS-12 or in PKCS-8 DER format.\n\
  If your key has a password, provide it using the sslpassword connection parameter described below. Otherwise, you can add the flag -nocrypt to the above command to prevent the driver from requesting a password.
CG_JDBC_PARAMS_POSTGRESQL_sslpassword=If provided will be used by ConsoleCallbackHandler
CG_JDBC_PARAMS_POSTGRESQL_sslpasswordcallback=Class name of the SSL password provider.
CG_JDBC_PARAMS_POSTGRESQL_sslrootcert=File name of the SSL root certificate. It can be a PEM encoded X509v3 certificate.
CG_JDBC_PARAMS_POSTGRESQL_sslhostnameverifier=Class name of hostname verifier.
CG_JDBC_PARAMS_POSTGRESQL_sslResponseTimeout=Time in milliseconds to wait for a response after requesting an SSL encrypted connection from the server. If this is greater than the current connectTimeout then connectTimeout will be used.
CG_JDBC_PARAMS_POSTGRESQL_protocolVersion=The driver supports the V3 frontend/backend protocols. The V3 protocol was introduced in 7.4 and the driver will by default try to connect using the V3 protocol.
CG_JDBC_PARAMS_POSTGRESQL_loggerLevel=This property is no longer used by the driver and will be ignored. All logging configuration is handled by java.util.logging.
CG_JDBC_PARAMS_POSTGRESQL_loggerFile=This property is no longer used by the driver and will be ignored. All logging configuration is handled by java.util.logging.
CG_JDBC_PARAMS_POSTGRESQL_allowEncodingChanges=When using the V3 protocol the driver monitors changes in certain server configuration parameters that should not be touched by end users. The client_encoding setting is set by the driver and should not be altered. \
  If the driver detects a change it will abort the connection. There is one legitimate exception to this behaviour though, using the COPY command on a file residing on the server’s filesystem. The only means of specifying the encoding of this file is by altering the client_encoding setting. \
  The JDBC team considers this a failing of the COPY command and hopes to provide an alternate means of specifying the encoding in the future, but for now there is this URL parameter. Enable this only if you need to override the client encoding when doing a copy.
CG_JDBC_PARAMS_POSTGRESQL_logUnclosedConnections=Clients may leak Connection objects by failing to call its close() method. Eventually these objects will be garbage collected and the finalize() method will be called which will close the Connection if caller has neglected to do this himself. \
  The usage of a finalizer is just a stopgap solution. To help developers detect and correct the source of these leaks the logUnclosedConnections URL parameter has been added. It captures a stacktrace at each Connection opening and if the finalize() method is reached without having been closed the stacktrace is printed to the log.
CG_JDBC_PARAMS_POSTGRESQL_autosave=Specifies what the driver should do if a query fails. In autosave=always mode, JDBC driver sets a savepoint before each query, and rolls back to that savepoint in case of failure. In autosave=never mode (default), no savepoint dance is made ever. \
  In autosave=conservative mode, savepoint is set for each query, however the rollback is done only for rare cases like ‘cached statement cannot change return type’ or ‘statement XXX is not valid’ so JDBC driver rolls back and retries
CG_JDBC_PARAMS_POSTGRESQL_cleanupSavepoints=Determines if the SAVEPOINT created in autosave mode is released prior to the statement. This is done to avoid running out of shared buffers on the server in the case where 1000’s of queries are performed.
CG_JDBC_PARAMS_POSTGRESQL_binaryTransfer=Use binary format for sending and receiving data if possible. Setting this to false disables any binary transfer.
CG_JDBC_PARAMS_POSTGRESQL_binaryTransferEnable=A comma separated list of types to enable binary transfer. Either OID numbers or names.
CG_JDBC_PARAMS_POSTGRESQL_binaryTransferDisable=A comma separated list of types to disable binary transfer. Either OID numbers or names. Over-rides values in the driver default set and values set with binaryTransferEnable.
CG_JDBC_PARAMS_POSTGRESQL_databaseMetadataCacheFields=Specifies the maximum number of fields to be cached per connection. A value of 0 disables the cache.
CG_JDBC_PARAMS_POSTGRESQL_databaseMetadataCacheFieldsMiB=Specifies the maximum size (in megabytes) of fields to be cached per connection. A value of 0 disables the cache.
CG_JDBC_PARAMS_POSTGRESQL_prepareThreshold=Determine the number of PreparedStatement executions required before switching over to use server side prepared statements. The default is five, meaning start using server side prepared statements on the fifth execution of the same PreparedStatement object. \
  More information on server side prepared statements is available in the section called Server Prepared Statements.
CG_JDBC_PARAMS_POSTGRESQL_preparedStatementCacheQueries=Determine the number of queries that are cached in each connection. The default is 256, meaning if you use more than 256 different queries in prepareStatement() calls, the least recently used ones will be discarded. \
  The cache allows application to benefit from Server Prepared Statements (see prepareThreshold ) even if the prepared statement is closed after each execution. The value of 0 disables the cache. N. B. Each connection has its own statement cache.
CG_JDBC_PARAMS_POSTGRESQL_preparedStatementCacheSizeMiB=Determine the maximum size (in mebibytes) of the prepared queries cache (see preparedStatementCacheQueries ). The default is 5, meaning if you happen to cache more than 5 MiB of queries the least recently used ones will be discarded. \
  The main aim of this setting is to prevent OutOfMemoryError . The value of 0 disables the cache.
CG_JDBC_PARAMS_POSTGRESQL_preferQueryMode=Specifies which mode is used to execute queries to database: simple means (‘Q’ execute, no parse, no bind, text mode only), extended means always use bind/execute messages, extendedForPrepared means extended for prepared statements only, \
  endedCacheEverything means use extended protocol and try cache every statement (including Statement.execute(String sql)) in a query cache. extended | extendedForPrepared | extendedCacheEverything | simple
CG_JDBC_PARAMS_POSTGRESQL_defaultRowFetchSize=Determine the number of rows fetched in ResultSet by one fetch with trip to the database. Limiting the number of rows are fetch with each trip to the database allow avoids unnecessary memory consumption and as a consequence OutOfMemoryError . \
  The default is zero, meaning that ResultSet will fetch all rows at once. Must be > 0.
CG_JDBC_PARAMS_POSTGRESQL_loginTimeout=Specify how long to wait for establishment of a database connection. The timeout is specified in seconds max(2147484).
CG_JDBC_PARAMS_POSTGRESQL_connectTimeout=The timeout value used for socket connect operations. If connecting to the server takes longer than this value, the connection is broken. The timeout is specified in seconds max(2147484) and a value of zero means that it is disabled.
CG_JDBC_PARAMS_POSTGRESQL_socketTimeout=The timeout value used for socket read operations. If reading from the server takes longer than this value, the connection is closed. This can be used as both a brute force global query timeout and a method of detecting network problems. \
  The timeout is specified in seconds max(2147484) and a value of zero means that it is disabled.
CG_JDBC_PARAMS_POSTGRESQL_cancelSignalTimeout=Cancel command is sent out of band over its own connection, so cancel message can itself get stuck. This property controls “connect timeout” and “socket timeout” used for cancel commands. The timeout is specified in seconds.
CG_JDBC_PARAMS_POSTGRESQL_tcpKeepAlive=Enable or disable TCP keep-alive probe.
CG_JDBC_PARAMS_POSTGRESQL_tcpNoDelay=Enable or disable TCP nodelay.
CG_JDBC_PARAMS_POSTGRESQL_unknownLength=Certain postgresql types such as TEXT do not have a well-defined length. When returning meta-data about these types through functions like ResultSetMetaData.getColumnDisplaySize and ResultSetMetaData.getPrecision \
  we must provide a value and various client tools have different ideas about what they would like to see. This parameter specifies the length to return for types of unknown length.
CG_JDBC_PARAMS_POSTGRESQL_stringtype=Specify the type to use when binding PreparedStatement parameters set via setString() . If stringtype is set to VARCHAR (the default), such parameters will be sent to the server as varchar parameters. \
  If stringtype is set to unspecified , parameters will be sent to the server as untyped values, and the server will attempt to infer an appropriate type. This is useful if you have an existing application that uses setString() to set parameters that are actually some other type, such as integers, \
  and you are unable to change the application to use an appropriate method such as setInt() .
CG_JDBC_PARAMS_POSTGRESQL_ApplicationName=Specifies the name of the application that is using the connection. This allows a database administrator to see what applications are connected to the server and what resources they are using through views like pg_stat_activity.
CG_JDBC_PARAMS_POSTGRESQL_kerberosServerName=The Kerberos service name to use when authenticating with GSSAPI. This is equivalent to libpq’s PGKRBSRVNAME environment variable and defaults to “postgres”.
CG_JDBC_PARAMS_POSTGRESQL_jaasApplicationName=Specifies the name of the JAAS system or application login configuration.
CG_JDBC_PARAMS_POSTGRESQL_jaasLogin=Specifies whether to perform a JAAS login before authenticating with GSSAPI. If set to true (the default), the driver will attempt to obtain GSS credentials using the configured JAAS login module(s) (e.g. Krb5LoginModule ) before authenticating. \
  To skip the JAAS login, for example if the native GSS implementation is being used to obtain credentials, set this to false .
CG_JDBC_PARAMS_POSTGRESQL_gssEncMode=PostgreSQL® 12 and later now allow GSSAPI encrypted connections. This parameter controls whether to enforce using GSSAPI encryption or not. The options are disable , allow , prefer and require.\n\
  disable: is obvious and disables any attempt to connect using GSS encrypted mode\n\
  allow: will connect in plain text then if the server requests it will switch to encrypted mode\n\
  prefer: will attempt to connect in encrypted mode and fall back to plain text if it fails to acquire an encrypted connection\n\
  require: attempts to connect in encrypted mode and will fail to connect if that is not possible.
CG_JDBC_PARAMS_POSTGRESQL_gsslib=Force either SSPI (Windows transparent single-sign-on) or GSSAPI (Kerberos, via JSSE) to be used when the server requests Kerberos or SSPI authentication. Permissible values are auto (default, see below), sspi (force SSPI) or gssapi (force GSSAPI-JSSE). \
  If this parameter is auto, SSPI is attempted if the server requests SSPI authentication, the JDBC client is running on Windows, and the Waffle libraries required for SSPI are on the CLASSPATH. Otherwise Kerberos/GSSAPI via JSSE is used.
CG_JDBC_PARAMS_POSTGRESQL_gssResponseTimeout=Time in milliseconds to wait for a response after requesting a GSS encrypted connection from the server. If this is greater than the current connectTimeout then connectTimeout will be used.
CG_JDBC_PARAMS_POSTGRESQL_sspiServiceClass=Specifies the name of the Windows SSPI service class that forms the service class part of the SPN. The default, POSTGRES, is almost always correct. See: SSPI authentication (Pg docs) Service Principal Names (MSDN), DsMakeSpn (MSDN) Configuring SSPI (Pg wiki). This parameter is ignored on non-Windows platforms.
CG_JDBC_PARAMS_POSTGRESQL_useSpnego=Use SPNEGO in SSPI authentication requests
CG_JDBC_PARAMS_POSTGRESQL_sendBufferSize=Sets SO_SNDBUF on the connection stream
CG_JDBC_PARAMS_POSTGRESQL_receiveBufferSize=Sets SO_RCVBUF on the connection stream
CG_JDBC_PARAMS_POSTGRESQL_readOnly=Put the connection in read-only mode
CG_JDBC_PARAMS_POSTGRESQL_readOnlyMode=One of ignore, transaction, or always. Controls the behaviour when a connection is set to read only, When set to ignore then the readOnly setting has no effect. When set to transaction and readOnly is set to true and autocommit is false the driver will set the transaction to readonly by sending BEGIN READ ONLY. \
  When set to always and readOnly is set to true the session will be set to READ ONLY if autoCommit is true. If autocommit is false the driver will set the transaction to read only by sending BEGIN READ ONLY. The default the value is transaction
CG_JDBC_PARAMS_POSTGRESQL_disableColumnSanitiser=Setting this to true disables column name sanitiser. The sanitiser folds columns in the ResultSet to lowercase. The default is to sanitise the columns (false).
CG_JDBC_PARAMS_POSTGRESQL_assumeMinServerVersion=Assume that the server is at least the given version, thus enabling to some optimization at connection time instead of trying to be version blind.
CG_JDBC_PARAMS_POSTGRESQL_currentSchema=Specify the schema (or several schema separated by commas) to be set in the search-path. This schema will be used to resolve unqualified object names used in statements over this connection.
CG_JDBC_PARAMS_POSTGRESQL_targetServerType=Allows opening connections to only servers with required state, the allowed values are any, primary, master, slave, secondary, preferSlave, preferSecondary and preferPrimary. The primary/secondary distinction is currently done by observing if the server allows writes. \
  The value preferSecondary tries to connect to secondary if any are available, otherwise allows falls back to connecting also to primary. The value preferPrimary tries to connect to primary if it is available, otherwise allows falls back to connecting to secondaries available.\n\
  N.B. the words master and slave are being deprecated. We will silently accept them, but primary and secondary are encouraged.
CG_JDBC_PARAMS_POSTGRESQL_hostRecheckSeconds=Controls how long in seconds the knowledge about a host state is cached in JVM wide global cache. The default value is 10 seconds.
CG_JDBC_PARAMS_POSTGRESQL_loadBalanceHosts=In default mode (disabled) hosts are connected in the given order. If enabled hosts are chosen randomly from the set of suitable candidates.
CG_JDBC_PARAMS_POSTGRESQL_socketFactory=The provided value is a class name to use as the SocketFactory when establishing a socket connection. This may be used to create unix sockets instead of normal sockets. The class name specified by socketFactory must extend javax.net.SocketFactory and be available to the driver’s classloader. \
  This class must have a zero-argument constructor, a single-argument constructor taking a String argument, or a single-argument constructor taking a Properties argument. The Properties object will contain all the connection parameters. The String argument will have the value of the socketFactoryArg connection parameter.
CG_JDBC_PARAMS_POSTGRESQL_socketFactoryArg=This value is an optional argument to the constructor of the socket factory class provided above.
CG_JDBC_PARAMS_POSTGRESQL_reWriteBatchedInserts=This will change batch inserts from insert into foo (col1, col2, col3) values (1, 2, 3) into insert into foo (col1, col2, col3) values (1, 2, 3), (4, 5, 6) this provides 2-3x performance improvement
CG_JDBC_PARAMS_POSTGRESQL_replication=Connection parameter passed in the startup message. This parameter accepts two values; true and database . Passing true tells the backend to go into walsender mode, wherein a small set of replication commands can be issued instead of SQL statements. \
  Only the simple query protocol can be used in walsender mode. Passing “database” as the value instructs walsender to connect to the database specified in the dbname parameter, which will allow the connection to be used for logical replication from that database. \
  Parameter should be use together with assumeMinServerVersion with parameter >= 9.4 (backend >= 9.4)
CG_JDBC_PARAMS_POSTGRESQL_escapeSyntaxCallMode=Specifies how the driver transforms JDBC escape call syntax into underlying SQL, for invoking procedures or functions. In escapeSyntaxCallMode=select mode (the default), the driver always uses a SELECT statement (allowing function invocation only). \
  In escapeSyntaxCallMode=callIfNoReturn mode, the driver uses a CALL statement (allowing procedure invocation) if there is no return parameter specified, otherwise the driver uses a SELECT statement. In escapeSyntaxCallMode=call mode, the driver always uses a CALL statement (allowing procedure invocation only).
CG_JDBC_PARAMS_POSTGRESQL_maxResultBuffer=Specifies size of buffer during fetching result set. Can be specified as specified size or percent of heap memory.
CG_JDBC_PARAMS_POSTGRESQL_adaptiveFetch=Specifies if the number of rows, fetched in ResultSet per request from the database, should be dynamic. Using dynamic number of rows, computed by adaptive fetch, will attempt to use maximize the use of the buffer declared in maxResultBuffer property. \
  Number of rows would be calculated by dividing maxResultBuffer size into max row size observed so far, rounded down. First fetch will have number of rows declared in defaultRowFetchSize. Number of rows can be limited by adaptiveFetchMinimum and adaptiveFetchMaximum. Requires declaring of maxResultBuffer and defaultRowFetchSize to work. By default, adaptiveFetch is false.
CG_JDBC_PARAMS_POSTGRESQL_adaptiveFetchMinimum=Specifies the lowest number of rows which can be calculated by adaptiveFetch. Requires adaptiveFetch set to true to work. By default, minimum of rows calculated by adaptiveFetch is 0.
CG_JDBC_PARAMS_POSTGRESQL_adaptiveFetchMaximum=Specifies the highest number of rows which can be calculated by adaptiveFetch. Requires adaptiveFetch set to true to work. By default, maximum of rows calculated by adaptiveFetch is -1, which is understood as infinite.
CG_JDBC_PARAMS_POSTGRESQL_logServerErrorDetail=Whether to include server error details in exceptions and log messages (for example inlined query parameters). Setting to false will only include minimal, not sensitive messages. By default, this is set to true, server error details are propagated. This may include sensitive details such as query parameters.
CG_JDBC_PARAMS_POSTGRESQL_quoteReturningIdentifiers=Quote returning columns. There are some ORM’s that quote everything, including returning columns If we quote them, then we end up sending ““colname”” to the backend instead of “colname” which will not be found.
CG_JDBC_PARAMS_POSTGRESQL_authenticationPluginClassName=Fully qualified class name of the class implementing the AuthenticationPlugin interface. If this is null, the password value in the connection properties will be used.
