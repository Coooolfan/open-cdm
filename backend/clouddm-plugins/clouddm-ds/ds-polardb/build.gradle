plugins {
    id 'com.clougence.plugin-conventions'
    id 'antlr'
}

dependencies {
    // project
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    implementation project(':dsc-common-mysql')
    implementation project(':dsc-common-postgres')

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // driver libs (compileOnly)
    compileOnly 'org.postgresql:postgresql:42.2.9'
    compileOnly 'mysql:mysql-connector-java:8.0.25'

    // for test
    testImplementation project(':cgdm-plugin-sdk')
    testImplementation project(':dsc-common-mysql')
    testImplementation project(':dsc-common-postgres')
}

description = 'ds-polardb'

configureClougenceAntlrGrammar([outputPath : 'src/main/java/com/clougence/clouddm/ds/polardb/parser/porx/antlr',
                                packageName: 'com.clougence.clouddm.ds.polardb.parser.porx.antlr',
                                libDir     : '../dsc-common-mysql/src/main/antlr'])


def visitorConfigs = [[taskName: 'generateVisitorPorxParser', frontPath: 'porx/AbstractPorXSQLParserVisitor.java', backPath: 'MySQLParserVisitor.java'],
                      [taskName: 'generateVisitorPorxVisitor', frontPath: 'porx/AbstractPorXSplitVisitor.java', backPath: 'MySplitVisitor.java']]

visitorConfigs.each { config ->
    tasks.register(config.taskName, VisitorMerger) {
        backFile = file("../dsc-common-mysql/src/main/java/com/clougence/clouddm/dsfamily/mysql/analysis/${config.backPath}")
        frontFile = file("./src/main/java/com/clougence/clouddm/ds/polardb/analysis/${config.frontPath}")
    }
}

jar {
    dependsOn(visitorConfigs.collect { tasks.named(it.taskName) })
    dependsOn('generateGrammarSource')
}

