CG_JDBC_PARAMS_DM_unixSocketFile=LINUX 系统中，当服务器与客户端之间使用 UNIXSOCETUNIX-IPC 方式通信时，用于指定客户端连接的 UNIXSOCKET 路径文件名。使用 unixSocketFile 时，不需要指定 host 和 port。\n\
  例如：jdbc:dm://?user=SYSDBA&password=SYSDBA&unixSocketFile=/home/te/foo.sock
CG_JDBC_PARAMS_DM_user=登录用户
CG_JDBC_PARAMS_DM_password=登录密码
CG_JDBC_PARAMS_DM_appName=客户端应用程序名称
CG_JDBC_PARAMS_DM_osName=操作系统名称
CG_JDBC_PARAMS_DM_socketTimeout=网络通信链路超时时间；单位 ms，取值范围 0~2147483647，0 表示无限制；缺省为 0
CG_JDBC_PARAMS_DM_sessionTimeout=会话超时时间；单位 ms，取值范围 0~2147483647，0 表示无限制；缺省为 0
CG_JDBC_PARAMS_DM_connectTimeout=连连接数据库超时时间；单位 ms，取值范围 0~2147483647，0 表示无限制；缺省为 5000
CG_JDBC_PARAMS_DM_StmtPoolSize=语句句柄池大小；取值范围 0~2147483647，0 表示关闭；缺省为 15
CG_JDBC_PARAMS_DM_PStmtPoolSize=prepare 语句句柄池大小；取值范围 0~2147483647，0 表示关闭；缺省为 0
CG_JDBC_PARAMS_DM_pstmtPoolValidTime=prepare 语句缓存的有效时间；单位 ms，取值范围 0~2147483647，0 表示无限制；缺省为 0
CG_JDBC_PARAMS_DM_escapeProcess=是否进行语法转义处理；取值 1/0 或 true/false；缺省为 true；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_autoCommit=是否自动提交；取值 1/0 或 true/false；缺省为 true；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_alwayseAllowCommit=在自动提交开关打开时，调用 rollback()接口是否不报错；取值 1/0 或 true/false；缺省为 true；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_localTimezone=指定客户端本地时区，对于本地时区相关时间类型会自动完成服务器时区与本地时区的转换；单位分钟，取值范围-779~840；缺省为当前系统时区
CG_JDBC_PARAMS_DM_maxRows=结果集行数限制，超过上限结果集截断；取值范围 0~2147483647，0 表示无限制；缺省为 0
CG_JDBC_PARAMS_DM_bufPrefetch=结果集 fetch 预取消息 buffer 大小；单位 KB，取值范围 32~65535。缺省为 0，表示按服务器配置，若结果集上指定了 fetchSize 会自动预估大小
CG_JDBC_PARAMS_DM_LobMode=大字段数据获取模式；1 表示 get 数据时从服务器段获取，2 表示结果集生成时将大字段数据完整缓存到本地；缺省为 1
CG_JDBC_PARAMS_DM_ignoreCase=结果集列名是否忽略大小写；取值 1/0 或 true/false；缺省为 true；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_continueBatchOnError=批量执行出错时是否继续执行；缺省为 false；取值（true/True，false/False）；true/True：是，false/False：否
CG_JDBC_PARAMS_DM_batchType=批处理模式；1 表示批量绑定执行，2 表示一行一行执行；缺省为 1
CG_JDBC_PARAMS_DM_resultSetType=指定默认创建结果集类型，与 java 标准中结果集类型相对应；取值 1003/1004/1005，缺省为 1003；\n\
  1003：对应 ResultSet.TYPE_FORWARD_ONLY；\n1004：对应 ResultSet.TYPE_SCROLL_INSENSITIVE；\n1005：对应 ResultSet.TYPE_SCROLL_SENSITIVE
CG_JDBC_PARAMS_DM_dbmdChkPrv=编目函数是否进行权限检测；取值 1/0 或 true/false；缺省为 true；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_isBdtaRS=是否使用列模式结果集，需同步服务器开启该功能；取值 1/0 或 true/false；缺省为 true；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_clobAsString=clob 类型列调用 resultSetMetaData 的 getColumnType()映射为 Types.VARCHAR 类型；取值 1/0 或 true/false；缺省为 false；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_columnNameCase=结果集列名大小写转换。取值 upper/lower/空值，缺省为空值。upper 表示转为大写；lower 表示转为小写；空值表示保持不变
CG_JDBC_PARAMS_DM_compatible_mode=兼容其他数据库。取值为数据库名称：oracle 表示兼容 Oracle，oracle19 表示兼容 Oracle 19c，mysql 表示兼容 Mysql。本参数和 DM.INI 中的 COMPATIBLE_MODE 同名，但用途不同
CG_JDBC_PARAMS_DM_schema=指定用户登录后的当前模式，默认为用户的默认模式
CG_JDBC_PARAMS_DM_loginMode=指定优先登录的服务器模式。取值范围 0~4；0：优先连接 PRIMARY 模式的库，NORMAL 模式次之，最后选择 STANDBY 模式；\
  1：只连接主库；2：只连接备库；3：优先连接 STANDBY 模式的库，PRIMARY 模式次之，最后选择 NORMAL 模式；4：优先连接 NORMAL 模式的库，PRIMARY 模式次之，最后选择 STANDBY 模式；缺省为 4\n\
  当启用读写分离时（即 rwSeparate 不为 0），loginMode 不生效
CG_JDBC_PARAMS_DM_loginStatus=服务名方式连接数据库时只选择状态匹配的库； 取值范围 0、3~5；0 表示不限制；3 表示 mount 状态；4 表示 open 状态；5 表示 suspend 状态；缺省为 0
CG_JDBC_PARAMS_DM_loginDscCtrl=服务名连接数据库时只选择 dsc control 节点的库；取值 1/0 或 true/false；缺省为 false；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_epSelector=服务名连接数据库时采用何种模型建立连接；0 表示依次选取列表中的不同节点建立连接，使得所有连接均匀地分布在各个节点上；1 表示选择列表中最前面的节点建立连接，只有当前节点无法建立连接时才会选择下一个节点进行连接；缺省为 0
CG_JDBC_PARAMS_DM_autoReconnect=连接发生异常或一些特殊场景下连接处理策略。取值范围 0~7；0：关闭连接；1：当连接发生异常时自动切换到其他库，无论切换成功还是失败都会抛一个 SQLException，用于通知上层应用进行事务执行失败时的相关处理；2：配合 epSelector=1 使用，\
  如果服务名列表前面的节点恢复了，将当前连接切换到前面的节点上；4：保持各节点会话动态均衡，通过后台线程检测节点及会话数变化，并切换连接使之保持均衡。也可以将 autoReconnect 置为上述几个值的组合值，表示同时进行多项配置，如置为 3 表示同时配置 1 和 2；缺省为 0
CG_JDBC_PARAMS_DM_switchTimes=服务名连接数据库时，若未找到符合条件的库成功建立连接，将尝试遍历服务名中库列表的次数；取值范围 1~2147483647；缺省为 1
CG_JDBC_PARAMS_DM_switchInterval=服务名连接数据库时，若遍历了服务名中所有库列表都未找到符合条件的库成功建立连接，等待一定时间再继续下一次遍历；单位 ms，取值范围 0~2147483647；缺省为 1000
CG_JDBC_PARAMS_DM_cluster=用于标识的集群类型。\nDW：主备；\nRW：读写分离；\nMPP：大规模并行处理集群；\nDPC：分布计算集群；\nDSC：共享存储集群。cluster=DSC 须配合 autoReconnect=2、epSelector=1 使用，用于检测 DSC 集群节点故障恢复是否成功
CG_JDBC_PARAMS_DM_dbAliveCheckFreq=检测数据库是否存活的频率。单位 ms，取值范围 0~2147483647，0 表示不检测；缺省为 0
CG_JDBC_PARAMS_DM_compress=是否压缩消息。取值范围 0~2。0 表示不压缩；1 表示完全压缩；2 表示优化的压缩；缺省为 0
CG_JDBC_PARAMS_DM_compressID=消息压缩算法标识，最终与服务器支持情况协商决定。0 表示 zip；1 表示 snappy； 缺省为 0
CG_JDBC_PARAMS_DM_sslFilesPath=数据库端开启 ssl 通信加密，该参数指定 ssl 加密文件的路径
CG_JDBC_PARAMS_DM_sslKeystorePass=数据库端开启 ssl 通信加密，该参数指定 ssl 加密文件的指令
CG_JDBC_PARAMS_DM_kerberosLoginConfPath=用户名加前缀 ”///” 标识开启 Kerberors 认证，该参数指定 Kerberors 认证登录配置文件路径
CG_JDBC_PARAMS_DM_uKeyName=Ukey 的用户名
CG_JDBC_PARAMS_DM_uKeyPin=Ukey 的口令
CG_JDBC_PARAMS_DM_cipherPath=第三方加密算法引擎所在路径
CG_JDBC_PARAMS_DM_OsAuthType=指定操作系统认证用户类型，开启操作系统认证时，用户名使用系统用户名。取值范围 0~4；0 表示关闭；1 表示 DBA；2 表示 SSO； 3 表示 AUDITOR；4 表示自适应。缺省为 0
CG_JDBC_PARAMS_DM_loginCertificate=指定登录加密用户名密码公钥所在的路径，一旦配置即认为开启了客户端的证书加密用户名密码模式
CG_JDBC_PARAMS_DM_mppLocal=是否 MPP 本地连接；取值 1/0 或 true/false；缺省为 false；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_rwSeparate=是否使用读写分离系统。0 表示不启用；1 表示启用；2 表示启用，备库由客户端进行选择，且只会选择服务名中配置的节点；4 表示启用，备库由客户端进行选择，只连接事务一致性备库。缺省为 0\n当启用读写分离时，loginMode 失效
CG_JDBC_PARAMS_DM_rwPercent=分发到主库的事务占主备库总事务的百分比；单位 %，取值范围 0~100；缺省为 25
CG_JDBC_PARAMS_DM_rwAutoDistribute=读写分离系统事务分发是否由 JDBC 自动管理；取值 1/0 或 true/false；缺省为 true；1/true：是，false：事务分发由用户管理，用户可通过设置连接上的 readOnly 属性标记事务为只读事务
CG_JDBC_PARAMS_DM_rwHA=是否开启读写分离系统高可用；取值 1/0 或 true/false；缺省为 false；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_rwStandbyRecoverTime=读写分离系统备库故障恢复检测间隔，单位 ms，取值范围 0~2147483647，0 表示不回复；缺省为 60000
CG_JDBC_PARAMS_DM_enRsCache=是否开启结果集缓存；取值 1/0 或 true/false；缺省为 false；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_rsCacheSize=设置结果集缓冲区大小，单位 MB。取值范围 1~65535，如果设置太大，可能导致空间分配失败，进而使缓存失效
CG_JDBC_PARAMS_DM_rsRefreshFreq=结果集缓存检查更新的频率，单位 S，取值范围 0~10000，如果设置为 0，则不需检查更新
CG_JDBC_PARAMS_DM_keyWords=标识用户关键字，所有在列表中的字符串，如果以单词的形式出现在 sql 语句中，则这个单词会被加上双引号；默认为空串
CG_JDBC_PARAMS_DM_logDir=日志等其他一些 JDBC 过程文件生成目录，默认为 jvm 当前工作目录
CG_JDBC_PARAMS_DM_logLevel=生成日志的级别，日志按从低到高依次如下（off：不记录；error：只记录错误日志；warn：记录警告信息；sql：记录 sql 执行信息；info：记录全部执行信息；all：记录全部），高级别同时记录低级别的信息；缺省为 off
CG_JDBC_PARAMS_DM_logFlushFreq=日志刷盘频率；单位 s，有效值范围 0~2147483647；缺省为 60
CG_JDBC_PARAMS_DM_statEnable=是否启用状态监控；取值 1/0 或 true/false；缺省为 false；1/true：是，0/false：否
CG_JDBC_PARAMS_DM_statDir=状态监控信息以文本文件形式输出的目录，默认为 jvm 当前工作目录
CG_JDBC_PARAMS_DM_statFlushFreq=状态监控统计信息写文件刷盘频率；单位 s，取值范围 0~2147483647；0 表示不写文件；缺省为 10
CG_JDBC_PARAMS_DM_statSlowSqlCount=统计慢 sql top 行数；取值范围 0~1000；缺省为 100
CG_JDBC_PARAMS_DM_statHighFreqSqlCount=统计高频 sql top 行数；取值范围 0~1000；缺省为 100
CG_JDBC_PARAMS_DM_statSqlMaxCount=状态监控可以统计不同 sql 的个数；取值范围 0~100000；缺省为 100000
CG_JDBC_PARAMS_DM_statSqlRemoveMode=执行的不同 sql 个数超过 statSqlMaxCount 时使用的淘汰方式；取值 latest/eldest；latest 表示淘汰最近执行的 sql，eldest 表示淘汰最老的 sql；缺省为 eldest
CG_JDBC_PARAMS_DM_dmsvcconf=指定 url 属性配置文件所在路径
CG_JDBC_PARAMS_DM_dbAliveCheckTimeout=检测数据库是否存活的连接超时时间，如果该时间内未连接成功即认为数据库故障；单位 ms，取值范围 1~2147483647；缺省为 10000
CG_JDBC_PARAMS_DM_checkFreq=服务名连接数据库时，循环检测连接是否需要重置的时间间隔。即每间隔设定时间检测连接对象是否发生改变，若连接对象发生改变，JDBC 连接会自动重置到新对象。单位 ms，取值范围 0~2147483647。缺省值为 300000
CG_JDBC_PARAMS_DM_prepareOptimize=是否对预编译 SQL 做优化；取值 1/0 或 true/false；缺省为 false;1/true：是，0/false：否
CG_JDBC_PARAMS_DM_allowRange=允许动态负载均衡误差范围的百分比，百分比越大表示允许的误差范围越大，取值范围 0~50。缺省为 5
CG_JDBC_PARAMS_DM_localEncrypt=是否启用用户名密码本地加密；取值 1/0 或 true/false；缺省为 false;1/true：是，0/false：否
CG_JDBC_PARAMS_DM_localEncryptEngine=本地加密引擎名，不指定时使用系统内置的加密引擎，用户可指定自定义的加密引擎
CG_JDBC_PARAMS_DM_genKeyNameCase=调用 preparedStatement(String sql, String[] columnName)接口 prepare sql 时可同时指定列名，用于在表数据增删改后返回指定的列值。该参数用于指定这里的列名的大小写。\
  取值 0/1/2 或 none/upper/lower；缺省为 upper。取值 0 或 none:保持用户输入不变；1 或 upper: 将用户输入转为大写；2 或 lower: 将用户输入转为小写
CG_JDBC_PARAMS_DM_afterGetMoreResults=调用 JDBC 标准接口 getMoreResults()后是否关闭之前的结果集；取值 1/2/3；缺省为 1；1：关闭当前一个结果集；2：保持当前结果集打开；3：关闭当前所有结果集
CG_JDBC_PARAMS_DM_checkExecType=是否检查 executeXXX 接口执行的 SQL 语句类型与接口是否匹配；取值 1/0 或 true/false；缺省为 false;1/true：是，0/false：否
CG_JDBC_PARAMS_DM_quoteReplace=是否将 SQL 语句中的双引号改成单引号；取值 1/0 或 true/false；缺省为 false;1/true：是，0/false：否
CG_JDBC_PARAMS_DM_ignoreWarnings=用于设置忽略指定的 SQLWarnings，取值与含义如下：\nall：忽略所有警告；\nsqlCode：忽略指定的警告；\nop sqlCode：忽略满足条件的警告，op 可以为符号 >、<、>=、<=、!；\n(sqlCode,sqlCode)：忽略指定的多个警告，默认为空
CG_JDBC_PARAMS_DM_paramBindMode=用于设置参数绑定类型，取值 1/0，缺省为 0。0：参数为推荐类型时，按用户类型进行绑定；1：参数为推荐类型时，按服务器推荐类型进行绑定
