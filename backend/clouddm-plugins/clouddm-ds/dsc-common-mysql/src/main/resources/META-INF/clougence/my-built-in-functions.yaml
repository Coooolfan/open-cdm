  - name: ADDTIME
    rdbParams:
      - { name: time1, type: TIME, ordinal: 1 }
      - { name: time2, type: TIME, ordinal: 2 }
    returns: { type: TIME }

  - name: CURDATE
    #    rdbParams:
    returns: { type: DATE }

  - name: CURRENT_TIME
    #    rdbParams:
    returns: { type: TIME }

  - name: CURRENT_TIMESTAMP
    #    rdbParams:
    returns: { type: TIMESTAMP }

  - name: DATE_ADD
    rdbParams:
      - { name: date, type: DATE, ordinal: 1 }
