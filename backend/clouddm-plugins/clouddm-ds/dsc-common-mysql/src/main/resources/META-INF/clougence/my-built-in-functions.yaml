# map to com.clougence.adapter.mysql.dialect.MySqlBuiltInFunction.FunctionListObj
functions:
  # ----- string function -----
  - name: LEFT
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
      - { name: n, type: INT, ordinal: 2 }
    returns: { type: VARCHAR }
  - name: LOWER
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: VARCHAR }
  - name: ASCII
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: INT }

  - name: CHAR_LENGTH
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: INT }

  - name: CONCAT
    rdbParams:
      - { name: s1, type: VARCHAR, ordinal: 1 }
      - { name: s2, type: VARCHAR, ordinal: 2 }
    returns: { type: VARCHAR }

  - name: CONCAT_WS
    rdbParams:
      - { name: separator, type: VARCHAR, ordinal: 1 }
      - { name: s1, type: VARCHAR, ordinal: 2 }
      - { name: s2, type: VARCHAR, ordinal: 3 }
    returns: { type: VARCHAR }

  - name: FIELD
    rdbParams:
      - { name: str, type: VARCHAR, ordinal: 1 }
      - { name: str1, type: VARCHAR, ordinal: 2 }
      - { name: str2, type: VARCHAR, ordinal: 3 }
    returns: { type: INT }

  - name: FIND_IN_SET
    rdbParams:
      - { name: str, type: VARCHAR, ordinal: 1 }
      - { name: strList, type: VARCHAR, ordinal: 2 }
    returns: { type: INT }

  - name: FORMAT
    rdbParams:
      - { name: x, type: DECIMAL, ordinal: 1 }
      - { name: d, type: INT, ordinal: 2 }
    returns: { type: VARCHAR }

  - name: INSTR
    rdbParams:
      - { name: str, type: VARCHAR, ordinal: 1 }
      - { name: substr, type: VARCHAR, ordinal: 2 }
    returns: { type: INT }

  - name: LTRIM
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: VARCHAR }

  - name: REPLACE
    rdbParams:
      - { name: str, type: VARCHAR, ordinal: 1 }
      - { name: from_str, type: VARCHAR, ordinal: 2 }
      - { name: to_str, type: VARCHAR, ordinal: 3 }
    returns: { type: VARCHAR }

  - name: REVERSE
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: VARCHAR }

  - name: RTRIM
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: VARCHAR }

  - name: SUBSTRING
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
      - { name: start, type: INT, ordinal: 2 }
      - { name: length, type: INT, ordinal: 3 }
    returns: { type: VARCHAR }

  - name: TRIM
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: VARCHAR }

  - name: UPPER
    rdbParams:
      - { name: s, type: VARCHAR, ordinal: 1 }
    returns: { type: VARCHAR }
  # ----- date functions -----
  - name: ADDDATE
    rdbParams:
      - { name: date, type: DATE, ordinal: 1 }
      - { name: days, type: INT, ordinal: 2 }
