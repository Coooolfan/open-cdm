CAT_KEY_DM_CICD=CI/CD
CAT_DM_SQL_AUDIT=SQL 审计
#
# -- for Role Auth Label
AUTH_KEY_DM_QUERY_CONSOLE=查询控制台使用权限
AUTH_KEY_DM_QUERY_EXPORT=导出查询结果集到本地
AUTH_KEY_DM_OBJECT_MANAGER=对象管理权限(包含：控制台使用权限)
AUTH_KEY_DM_DS_MAINTENANCE=数据库运维权限（包含：控制台使用权限、对象管理权限）
AUTH_KEY_DM_DATA_READ=数据保护配置查看
AUTH_KEY_DM_DATA_MANAGE=数据保护配置管理(包含：查看权限)
AUTH_KEY_DM_DS_READ=查询配置查看
AUTH_KEY_DM_DS_MANAGE=查询配置管理(包含：查看权限)
AUTH_KEY_DM_WORKER_READ=查询机器查看
AUTH_KEY_DM_WORKER_MANAGE=查询机器管理(包含：查看权限)
AUTH_KEY_DM_SECRULES_READ=安全规则/规范查看
AUTH_KEY_DM_SECRULES_MANAGE=安全规则/规范管理(包含：查看权限)
AUTH_KEY_DM_PROJECT_READ=项目查看
AUTH_KEY_DM_CHANGE_OPERATE=变更执行(包含: 查看权限)
AUTH_KEY_DM_PROJECT_MANAGE=项目管理(包含：查看权限)
AUTH_KEY_DM_IM_READ=IM 消息服务查看
AUTH_KEY_DM_IM_MANAGE=IM 消息服务管理(包含：查看权限)
AUTH_KEY_DM_CICD_READ=CI/CD 查看
AUTH_KEY_DM_CICD_MANAGE=CI/CD 管理(包含：查看权限)
AUTH_KEY_DM_SQL_AUDIT_READ=SQL 审计查看
#
# -- for Data Auth
AUTH_DATA_DM_QUERY=执行查询(DQL)
AUTH_DATA_DM_CALL=存储过程|函数 调用权限(包含：DQL 权限)
AUTH_DATA_DM_DML=数据变更 DML 权限(包含：DQL 权限)
AUTH_DATA_DM_DDL=结构定义 DDL 权限(包含：DQL 权限)
AUTH_DATA_DM_OBJ=数据库对象定义权限(包含：DQL、DDL 权限)
AUTH_DATA_DM_SPACE=Catalog/Schema 定义权限
AUTH_DATA_DM_DCL=数据库控制 DCL 权限
AUTH_DATA_DM_OTHER=其它类型语句
AUTH_DATA_DM_SENSITIVE=访问加密数据权限
AUTH_DATA_DM_TICKET=处理工单权限(包含：审批和执行 权限)
#
# -- for Data Auth (Redis)
AUTH_DATA_DM_REDIS_READ=读取命令 Read 权限
AUTH_DATA_DM_REDIS_WRITE=写入命令 Write 权限(包含：Read 权限)
AUTH_DATA_DM_REDIS_ADMIN=管理命令 Admin 权限(包含：Read、Write 权限)
AUTH_DATA_DM_REDIS_OTHER=其它类型命令