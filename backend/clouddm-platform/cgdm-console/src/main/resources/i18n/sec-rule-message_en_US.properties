DEPRECATED_RULE_N_CATALOG_CHARACTER_SET=（已废弃）限制库的字符集
DEPRECATED_RULE_D_CATALOG_CHARACTER_SET=对于 2.0 以前版本该规则只适用于 MySQL 及 TiDB 数据库，由于模型升级该规则在 2.0 版本时使用 “模式的字符集” 来替代。
DEPRECATED_RULE_N_CATALOG_COLLATE=（已废弃）限制库的排序规则
DEPRECATED_RULE_D_CATALOG_COLLATE=对于 2.0 以前版本该规则只适用于 MySQL 及 TiDB 数据库，由于模型升级该规则在 2.0 版本时使用 “模式的排序规则” 来替代。
DEPRECATED_RULE_N_COLUMN_NEED_DEFAULT=（已废弃）列必须有默认值
DEPRECATED_RULE_D_COLUMN_NEED_DEFAULT=在 2.0 版本时，为了区别不同数据库的特性，该规则在 2.0 版本时被拆分为 “新增列默认值”、“修改列默认值” 两个规则。
DEPRECATED_RULE_N_QUERY_ALLOW_TYPE=（已废弃）查询语句种类
DEPRECATED_RULE_D_QUERY_ALLOW_TYPE=在 2.0 版本中由于模型升级该规则使用 2.0 版本时使用 “查询中使用 WITH 子句” 规则替代。
DEPRECATED_RULE_N_QUERY_ALLOW_SUB_QUERY=（已废弃）禁止子查询
DEPRECATED_RULE_D_QUERY_ALLOW_SUB_QUERY=在 2.0 版本后使用 “查询语句中的子查询” 规则替代，可实现更加精准的控制。
DEPRECATED_RULE_N_UPDATE_TYPE=（已废弃）更新语句种类
DEPRECATED_RULE_D_UPDATE_TYPE=在 2.0 版本后使用 “更新语句中的子查询” 规则替代，可实现更加精准的控制。
DEPRECATED_RULE_N_INSERT_ONLY_VALUES=（已废弃）插入操作必须包含列定义
DEPRECATED_RULE_D_INSERT_ONLY_VALUES=规则属于重复性规则，为了保证内置规则的原子性，该规则被并入 “插入语句需要包含特定列” 规则中并通过配置 require 参数为 true 来达到相同效果。
