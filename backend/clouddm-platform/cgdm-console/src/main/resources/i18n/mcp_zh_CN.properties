# methods
MCP_M_DS_SETTINGS=这是一个辅助接口，用于获取 CloudDM 支持的数据源类型及其特性信息。具体包括：\
\n- 数据源类型\
\n- 数据源所属分类\
\n- 拼写敏感性（如：大写、小写、大小写混合或未指定）\
\n- SQL 生成时用于包裹数据库对象的左右限定符\
\n- 数据库组织结构层级（例如 Catalog > Schema > Table 或其他变体）\
\n此接口有助于在不同数据库环境下准确地生成 SQL 语句，并确保数据源的正确配置。
MCP_M_LIST_DS=查询数据源列表，这个接口会返回查询数据源的 `数字 ID` 和 `实例 ID`，这两个 ID 及其重要展示时放在前面。数字 ID 通常会参与后续其它接口的调用操作。\
  该接口的查询参数在模糊查询时不支持或的关系，例如 instanceIdLike 和 instanceDescLike 在同时指定的时候是一个与关系而非或关系。因此建议使用单个条件进行匹配。只有在遇到需要更精确的过滤时，才同时使用多个条件进行过滤。
MCP_M_DETAIL_DS=查询数据源详细信息，它需要一个 `数字 ID` 查询某一个数据源的具体信息，包括连接串，所属环境等信息。
MCP_M_LIST_LEVELS=查询数据源的组织结构层级列表。\
\n- 返回：按入参返回对应层级列表；入参为空返回所有环境，传入环境返回其下实例，依次类推。\
\n- 末端：到达 Catalog 或 Schema 时，返回表列表。\
\n- 返回结构恒定：\
\n  - objName：名称；\
\n  - objId：对象的数字 ID（部分场景不可靠，值为 -1 表示无意义）；\
\n  - objAlias：别名；在实例列表中为 InstanceDesc；\
\n  - objType：对象类型；数据库对象中定义类型丰富，其中最主要的有（Env、Instance、RdbCatalog、RdbExternalCatalog、RdbSchema、RdbExternalSchema、RdbTable、RdbExternalTable、RdbView、RdbMaterialized、RdbColumn）\
\n  - objAttr：Map。环境/实例包含较固定字段（如 dsType、status、dsInstance、dsInstanceDesc、dsEnvId）；Catalog/Schema/Table 包含更多与数据源相关的扩展属性，可能含“_tips”用于简略展示。
MCP_M_LIST_LEAF=根据对象类型，查询数据源的组织结构层级最末端下的对象列表。可以是表、视图、存储过程、存储函数、序列、等数据库对象。\
  这个接口需要指定层级路径和对象类型来获取对应的对象列表，它的局限性是不能查看某个对象的详情，例如查看表具有的列是不支持的。
MCP_M_EXECUTE_QUERY=从数据库查询数据，执行用户传入的 SQL 语句，并返回查询结果。\n- 支持多条 SQL 语句执行，语句间用分号分隔。\
\n- 支持查询计划查看，通过指定查询类型为 RequestPlan 来获取查询计划。\
\n- 支持规则检查，返回 ruleCheck 参数来查看规则检查结果，用户可根据结果决定是否继续执行查询。\
\n- 适用于各种数据库类型。\
\n- 在结果显示时需要明确告诉用户执行的具体 SQL（script 字段） 如果有改写动作需要明确提示用户改写的部分（通过对比 original和script 的差异）\
\n- rewriteTags 字段决定了改写的类型，如果用户需要明确知道改写的内容和原因可以提示这个信息。\
\n- receiveCost 提示给用户整个数据接收的时间有多长。\
\n- fetchCount 字段表示有多少数据被查询到了。
