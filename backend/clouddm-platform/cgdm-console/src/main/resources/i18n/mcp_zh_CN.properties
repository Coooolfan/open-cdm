# fields
MCP_F_DATA_SOURCE_ID_DESC=这个字段表示 `数字 ID`，是 Java 的 Long 类型，每个数据源都有唯一的 `数字 ID`。\
\n- 功能与 `实例 ID` 相同，但形式不同：\
\n- `数字 ID` 随使用增长，进位后字符串长度会增加。\
\n- `实例 ID` 是固定长度的、具有辨识度的字符串。\
\n- 在列表展示时，该字段应放在前面以方便标识。如果同时展示 `数字 ID` 和 `实例 ID`，优先展示 `实例 ID`。\
\n- 作为参数传入时，需与 `实例 ID` 区分，以免混淆。
MCP_F_DATA_SOURCE_TYPE_DESC=数据源类型，例如 MySQL、PostgreSQL、Oracle 等。每个数据源有且仅有一个确定的类型。不同类型的数据源在连接方式和查询语法等方面有所不同。\
\n- 在列表展示时，该字段应放在前面以凸显数据源类型，通常位于数据源 ID 之后。\
\n- 作为参数传入时：\
\n- 需注意拼写，接口会严格校验。\
\n- 一般使用上一个接口输出的数据源类型参数。\
\n- 如果没有上游接口提供数据源类型，可以通过 dsSettings 工具获取支持的数据源类型信息，并推断具体的数据源类型。
MCP_F_INSTANCE_ID_DESC=这个字段表示 `实例 ID`，是 Java 的 String 类型，每个数据源都有唯一的 `实例 ID`。实例 ID 具有一定的辨识度，通常其前几个字符表示数据源的类型。\
\n- 功能与 `数字 ID` 相同，但形式不同：\
\n- `实例 ID` 是固定长度、具有辨识度的字符串。\
\n- `数字 ID` 是纯数字，随着使用增长，进位后字符串长度会增加，而 `实例 ID` 不会有这种情况。\
\n- 在列表展示时，该字段应放在前面以方便标识。如果同时展示 `数字 ID` 和 `实例 ID`，优先展示 `实例 ID`。\
\n- 作为参数传入时，需与 `数字 ID` 区分，以免混淆。
MCP_F_INSTANCE_ID_LIKE_DESC=这个字段是 Java 的 String 类型，通常由用户传入，用于表示 `实例 ID` 或其部分内容。\
\n- 在一般列表查询中：如果结合用户输入可以明确确定一个数据源的 `数字 ID`，应优先使用 `数字 ID` 参数。否则，可以使用该字段进行模糊搜索。
MCP_F_INSTANCE_DESC_LIKE_DESC=Java String 类型，用户传入，用于标识“实例备注”。备注可被后续修改，与“实例 ID”不同。默认备注可能重复，使用时需注意区分或做模糊匹配。
MCP_F_HOST_LIKE_DESC=Java String 类型，表示数据源连接的服务器地址，可为 IP 或域名。支持列表查询的模糊搜索，匹配包含该字符串的所有地址。
MCP_F_LEVELS_DESC=表示要查询的目标数据库组织层级（环境的数字ID / 数据源数字ID / 库 Catalog / 模式 Schema / 表 Table）参数顺序要求按从上到下的顺序排列各层级名称或ID。\
\n- 约束：各级入参须来源于上一级输出；不支持包含“/”的名称，遇到时应提示或报错。\
\n- 参数举例：\
\n  - 当获取数据源列表时，需要传入 环境的数字ID，例如： 1、\
\n  - 当获取 Schema 列表时需要传入环境ID 和数据源数字ID，例如 1 / 2\。层级信息按照字符串数组形式定义，。
MCP_F_REFRESH_CACHE_DESC=是否刷新缓存，Java Boolean 类型。
MCP_F_LEAF_TYPE_DESC=表示要查询的“最末端层级”对象类型，用于限定返回的对象列表。可为表、外部表、视图、物化视图、序列、同义词、存储过程、存储函数等；常用枚举：Table、ExternalTable、View、Materialized、Sequence、Synonym。\
\n- 取值受数据源类型限制；以 dsSettings 接口的 leafExpand 为准。\
\n- 与 listLeaf 搭配使用，仅返回指定类型的对象。
MCP_F_LEAF_EXPAND_DESC=表示该数据源“末端层级”可返回对象的支持类型列表。\
\n\- 用途：供 listLeaf 接口作为可选类型集合与校验依据。\
\n\- 来源：由 dsSettings.leafExpand 提供，随数据源类型而变化。\
\n\- 示例：Table、ExternalTable、View、Materialized、Sequence、Synonym 等。
MCP_F_QUERY_TYPE_DESC=表示查询的类型，Java 的 String 类型。取值范围：\
  - RequestQuery 表示一个查询操作，可以执行任意 SQL 语句通常是查询。\
  - RequestPlan，当需要查看查询计划时使用该语句，因为有些数据源查询计划的查看可能无法通过一个 SQL 来完成。该模式下 CloudDM 可以有效的解决这个问题，它底层对于查询计划请求有专门优化。
MCP_F_QUERY_STRING_DESC=SQL 查询命令，可以是任意合法的查询语句，支持多条语句执行，语句间用分号分隔，有些数据源可能使用其它类型分隔符，例如 SQL SERVER 会使用 GO。但是绝大情况下分号是通用分隔符。\
\n- 注意事项：不支持查询语句中包含切换 Schema/Catalog 的命令，如 USE database_name；如有需要需要再另外一个查询，并通过 levels 参数决定。
MCP_F_QUERY_FORCE_DESC=是否强制执行查询，Java Boolean 类型。首次查询一般使用 false。\
\n- 当查询的返回信息 ruleCheckLevel 字段不为 PASS 时必须要需要用户来决定是否需要忽略提示继续执行，此时参数值应该为 true。\
\n- 如果 ruleCheckLevel 值为 SUGGEST 表示还可以通过设置为 true 来决定继续执行。\
\n- 如果 ruleCheckLevel 值为 FAILURE 则不用再执行了，以一个错误形式告诉用户 ruleCheckList 中没有满足的规则。