      labels:
        app: dm-sidecar
    spec:
      containers:
        - name: sidecar
          image: clougence/cgdm-sidecar:${build_version}
          ports:
            - containerPort: 8080
          env:
            - name: APP_WEB_PORT
              value: "8080"
            - name: DM_CLIENT_AK
              value: "ak0a2c62tdo1ap2416655mpyx0v36l359p1v5rn782caw8t0qkk1s94b80lfs90"
            - name: DM_CLIENT_SK
              value: "sk6206iy4pb0eydz9hg97jo3tu5d80j97e91bbql65167u8wb75x4ej6e4v4aa4"
            - name: DM_CLIENT_WSN
              value: "wsn582nm54ca045p014288w6e919ec6294m430h427619v64g0pyqzcjb5040q3f"
            - name: APP_SERVE_NAME
              value: dm_console
            - name: APP_SERVE_PORT
              value: "8008"
          volumeMounts:
            - name: conf
              mountPath: /root/cgdm/sidecar/conf
            - name: logs
