##############################################################
##                                                   Server ##
##############################################################
server.port=%APP_WEB_PORT%
jwt.secret=%APP_WEB_JWT%
server.tomcat.basedir=/opt/cgdm/alone/tmp
clouddm.rsocket.dns=%APP_SERVE_NAME%
clouddm.rsocket.console.port=%APP_SERVE_PORT%
##############################################################
##                                               DataSource ##
##############################################################
spring.datasource.jdbcurl=jdbc:mysql://%DB_HOST%:%DB_PORT%/%DB_DATABASE%
spring.datasource.username=%DB_USERNAME%
spring.datasource.password=%DB_PASSWORD%
##############################################################
##                                                DM Config ##
##############################################################
clougence.rdp.console.oppassword=false
clouddm.console.max-tx-session-user=20
clougence.rdp.login.reset.period.minuetes=1
console.config.cross.origins=*
editor.query.test=false
##############################################################
##                                                  sidecar ##
##############################################################
dw.sidecar.session.max-count=5
dw.sidecar.tool-session.max-count=5
# console query sidecar limits.
dw.sidecar.online.max-queue=4000
dw.sidecar.online.max-executor=200
dw.sidecar.online.max-fetch-count=500
# export and async query sidecar limits.
dw.sidecar.export.max-queue=4000
dw.sidecar.export.max-executor=200
dw.sidecar.export.max-fetch-count=-1
##############################################################
##                                                     Test ##
##############################################################
