server.port=%APP_WEB_PORT%
server.tomcat.basedir=/opt/cgdm/sidecar/tmp
## sidecar
#
dw.sidecar.session.max-count=10000
dw.sidecar.tool-session.max-count=10000
#
# console query sidecar limits.
dw.sidecar.online.max-queue=5000
dw.sidecar.online.max-executor=5000
dw.sidecar.online.max-fetch-count=10000
#
# export and async query sidecar limits.
dw.sidecar.export.max-queue=5000
dw.sidecar.export.max-executor=5000
dw.sidecar.export.max-fetch-count=-1
#
# sqlAudit
dm.sidecar.sqlAudit.enable=true
