# ============================================================
# CloudDM Alone — Kubernetes Deployment
# Generated from docker-alone.yml
# Usage: kubectl apply -f k8s-alone.yml
# Note: Replace ${build_version} with actual image tag,
#       e.g. sed "s|\${build_version}|arm64-3.1.1|g" ...
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: cgdm
---
# ---------------------- dm_alone ----------------------
apiVersion: v1
kind: Service
metadata:
  name: dm-alone
  namespace: cgdm
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 8222
      targetPort: 8222
    - name: serve
      port: 8008
      targetPort: 8008
  selector:
    app: dm-alone
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cgdm-alone-conf
  namespace: cgdm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cgdm-alone-logs
  namespace: cgdm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cgdm-alone-data
  namespace: cgdm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cgdm-mysql-data
  namespace: cgdm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dm-alone
  namespace: cgdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dm-alone
  template:
    metadata:
      labels:
        app: dm-alone
    spec:
      containers:
        - name: alone
          image: clougence/cgdm-alone:${build_version}
          ports:
            - containerPort: 8222
            - containerPort: 8008
          env:
            - name: APP_WEB_PORT
              value: "8222"
            - name: APP_WEB_JWT
              value: "ljgefdgjosdighjeroigh"
            - name: APP_SERVE_NAME
              value: dm_alone
            - name: APP_SERVE_PORT
              value: "8008"
            - name: MYSQL_EMBEDDED
              value: "true"
            - name: MYSQL_ROOT_PASSWORD
              value: "123456"
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: cdmgr
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              value: "123456"
          volumeMounts:
            - name: conf
              mountPath: /root/cgdm/alone/conf
            - name: logs
              mountPath: /root/cgdm/alone/logs
            - name: data
              mountPath: /root/cgdm/alone/data
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: conf
          persistentVolumeClaim:
            claimName: cgdm-alone-conf
        - name: logs
          persistentVolumeClaim:
            claimName: cgdm-alone-logs
        - name: data
          persistentVolumeClaim:
            claimName: cgdm-alone-data
        - name: mysql-data
          persistentVolumeClaim:
            claimName: cgdm-mysql-data
